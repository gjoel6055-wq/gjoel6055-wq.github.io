<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Cartas | Joel</title>
    <link rel="stylesheet" href="css/carta.css">

    <style>
        body {
            height: auto;
            min-height: 100vh;
            overflow: auto;
            padding: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="contenedor-carta">
        <h1>Crea tu Carta Interactiva 💌</h1>
        <p class="mensaje" style="font-size: 1rem; margin-bottom: 1rem;">
            Escribe el nombre de esa persona especial y tu mensaje. Te daremos un link secreto para que se lo envíes. (Pista: el botón "No" escapará de sus clics).
        </p>

        <input type="text" id="input-nombre" placeholder="¿Para quién es?" class="input-form">
        <textarea id="input-mensaje" placeholder="Escribe tu invitación aquí..." class="input-form textarea-form"></textarea>
      <p class="mensaje" style="font-size: 1rem; margin-bottom: 1rem">Incluye el código de país sin el símbolo + Ej: 593 98...</p>
        <input type="tel" id="input-whatsapp" placeholder="Tu WhatsApp (Ej: 54911...)" class="input-form" title="Incluye el código de país sin el símbolo +">

        <button id="btn-generar" class="btn btn-principal">Generar Carta ✨</button>

        <div id="zona-resultado" class="oculto">
            <p style="margin-top: 1.5rem; font-weight: bold;">¡Listo! Copia este link o escanea el QR:</p>

            <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                <input type="text" id="link-generado" readonly class="input-form url-resultado" style="margin: 0; flex-grow: 1;">
                <button id="btn-copiar" style="background-color: #4b5563; color: white; border: none; border-radius: 10px; padding: 0 20px; font-weight: bold; cursor: pointer; transition: background-color 0.3s;">Copiar</button>
            </div>

            <div id="contenedor-qr" style="margin-top: 1.5rem; text-align: center;">
                <img id="imagen-qr" src="" alt="Código QR de tu carta" style="display: none; margin: 0 auto; border-radius: 10px; border: 2px solid #e5e7eb; padding: 10px; background: white;">
                <button id="btn-descargar-qr" class="btn" style="display: none; margin: 1rem auto 0 auto; background-color: #2563eb; color: white; border: none; border-radius: 10px; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; width: auto;">📥 Descargar QR</button>
            </div>
        </div>
    </div>

    <script src="js/generador.js"></script>
</body>
</html>
